version: "2"

linters:
  default: standard

linters-settings:
  errcheck:
    exclude-functions:
      - io.Close
      - (io.Closer).Close
      - (*os.File).Close
      - (*net/http.Response.Body).Close
      - (net/http.ResponseWriter).Write
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Print
      - fmt.Printf
      - fmt.Println
      - fmt.Scan
      - fmt.Scanf
      - fmt.Scanln
